<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App 📝</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>
            <img src="https://cdn-icons-png.flaticon.com/128/3131/3131636.png" alt="Notes Icon">
            Notes App
        </h1>
        <button id="addNoteBtn">
            <img src="https://cdn-icons-png.flaticon.com/128/10270/10270677.png" class="btn-icon" alt="Add Icon">
            Create Note
        </button>

        <div class="notes-container" id="notesContainer">
            <!-- Notes will be dynamically added here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
